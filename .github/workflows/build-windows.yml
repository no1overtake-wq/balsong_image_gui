name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Windows icon from 1.png
        shell: pwsh
        run: |
          if (-not (Test-Path "1.png")) {
            Write-Error "1.png 파일이 저장소 최상위 폴더에 없습니다. balsong_image_gui.py와 같은 위치에 1.png를 올려주세요."
            exit 1
          }

          @'
          from pathlib import Path
          from PIL import Image

          src = Path("1.png")
          img = Image.open(src).convert("RGBA")

          # Windows 실행파일/작업표시줄/파일 탐색기에서 잘 보이도록 여러 크기를 한 ico에 넣음
          img.save(
              "app_icon.ico",
              sizes=[(16, 16), (24, 24), (32, 32), (48, 48), (64, 64), (128, 128), (256, 256)]
          )
          print("app_icon.ico created")
          '@ | python -

      - name: Build exe with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "마감보고" --icon "app_icon.ico" --add-data "1.png;." --add-data "app_icon.ico;." balsong_image_gui.py

      - name: Upload exe artifact
        uses: actions/upload-artifact@v7
        with:
          name: magam-report-windows
          path: dist/마감보고.exe
