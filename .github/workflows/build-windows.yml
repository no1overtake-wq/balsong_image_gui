name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Windows icon from 1.png
        shell: pwsh
        run: |
          if (-not (Test-Path "1.png")) {
            throw "1.png 파일이 저장소 루트 폴더에 없습니다. balsong_image_gui.py와 같은 위치에 1.png를 업로드하세요."
          }
          python - <<'PY'
          from pathlib import Path
          from PIL import Image

          src = Path("1.png")
          icon = Path("app_icon.ico")

          img = Image.open(src).convert("RGBA")
          if img.width != img.height:
              size = max(img.width, img.height)
              canvas = Image.new("RGBA", (size, size), (0, 0, 0, 0))
              canvas.paste(img, ((size - img.width) // 2, (size - img.height) // 2), img)
              img = canvas

          img.save(icon, format="ICO", sizes=[(16,16), (24,24), (32,32), (48,48), (64,64), (128,128), (256,256)])
          print(f"created {icon.resolve()}")
          PY

      - name: Build exe with PyInstaller
        run: |
          pyinstaller --clean --noconfirm --onefile --windowed --name "마감보고" --icon "app_icon.ico" --add-data "1.png;." --add-data "app_icon.ico;." balsong_image_gui.py

      - name: Upload exe artifact
        uses: actions/upload-artifact@v7
        with:
          name: closing-report-windows
          path: dist/마감보고.exe
